name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Install dependencies
        run: deno install
      - name: Type-check
        run: deno task check
      - name: Lint
        run: deno lint
      - name: Run tests
        run: deno task test
      - name: Build frontend
        run: deno task build
